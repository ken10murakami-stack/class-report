<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中学生向け所見ジェネレーター</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>中学生向け所見ジェネレーター</h1>
      <p class="lead">
        カテゴリごとの選択肢にチェックを入れて「所見を生成」を押すと、
        選択内容に対応する文例をランダムで1つずつ抽出して所見を作成します。
      </p>
      <p id="data-source" class="source">データソース: 読み込み中...</p>

      <section id="category-sections" class="categories" aria-label="所見カテゴリ"></section>

      <div class="actions">
        <button id="generate-btn" type="button">所見を生成</button>
        <button id="clear-btn" type="button" class="secondary">選択をクリア</button>
      </div>

      <section class="output-wrap" aria-live="polite">
        <h2>生成結果</h2>
        <textarea id="output" rows="8" placeholder="ここに生成された所見が表示されます（生成後に直接編集できます）"></textarea>
        <p id="status" class="status"></p>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
